<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HomeTest Operating Model</title>
<meta name="robots" content="noindex,nofollow">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif;
       background:linear-gradient(180deg,#005EB8 0%,#003087 100%);
       color:#212B32;display:flex;align-items:center;justify-content:center;padding:20px;}
  .gate{max-width:420px;width:100%;background:#fff;border-radius:14px;
        box-shadow:0 24px 60px rgba(0,32,64,0.35);padding:44px 40px;}
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:2.4px;color:#7E8B97;text-transform:uppercase;margin-bottom:10px;}
  h1{font-size:24px;font-weight:800;color:#003087;letter-spacing:-0.4px;margin-bottom:14px;line-height:1.2;}
  p.intro{font-size:13.5px;line-height:1.65;color:#4C6272;margin-bottom:26px;}
  label{display:block;font-size:11.5px;font-weight:700;letter-spacing:0.6px;color:#4C6272;text-transform:uppercase;margin-bottom:7px;}
  input[type=password]{width:100%;padding:12px 14px;font-size:15px;font-family:inherit;
                       border:1.5px solid #d9dee3;border-radius:8px;outline:none;transition:border-color 0.15s;}
  input[type=password]:focus{border-color:#005EB8;}
  button{width:100%;margin-top:14px;padding:12px 18px;background:#005EB8;color:#fff;
         border:none;border-radius:8px;font-size:14px;font-weight:700;letter-spacing:0.3px;
         cursor:pointer;font-family:inherit;transition:background 0.15s;}
  button:hover{background:#003087;}
  .err{color:#B5121B;font-size:12.5px;margin-top:10px;min-height:18px;font-weight:600;}
  .foot{margin-top:26px;padding-top:18px;border-top:1px solid #ebeef1;font-size:11px;color:#7E8B97;line-height:1.55;}
</style>
</head>
<body>
<div class="gate">
  <div class="eyebrow">Internal preview</div>
  <h1>HomeTest Operating Model</h1>
  <p class="intro">Restricted access. Please enter the password to continue.</p>
  <form id="gate-form">
    <label for="pwd">Password</label>
    <input type="password" id="pwd" autocomplete="off" autofocus>
    <button type="submit">Enter</button>
    <div class="err" id="err"></div>
  </form>
  <div class="foot">This site is a working draft. Do not share or redistribute.</div>
</div>
<script>
const EXPECTED = 'aff9e5c92aa9478e54cc10839fe9cf36615bbe4ae2ad7e6dd6e2c0c14f0b540e';
async function sha256(s){
  const buf = new TextEncoder().encode(s);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function nextTarget(){
  const params = new URLSearchParams(location.search);
  const n = params.get('next');
  return n && /^[A-Za-z0-9._%\- ]+\.html$/.test(decodeURIComponent(n)) ? decodeURIComponent(n) : 'home.html';
}
if (sessionStorage.getItem('hometest-auth') === 'ok') {
  location.href = nextTarget();
}
document.getElementById('gate-form').addEventListener('submit', async function(e){
  e.preventDefault();
  const v = document.getElementById('pwd').value;
  const h = await sha256(v);
  if (h === EXPECTED) {
    sessionStorage.setItem('hometest-auth', 'ok');
    location.href = nextTarget();
  } else {
    document.getElementById('err').textContent = 'Incorrect password.';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
});
</script>
</body>
</html>
