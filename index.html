<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>HomeTest Operating Model</title>
<style>
  :root {
    --nhs-dark:#003087; --nhs-blue:#005EB8; --amber:#FFB91D;
    --text:#212B32; --text-sec:#4C6272;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif;
    background:linear-gradient(180deg,var(--nhs-blue) 0%,var(--nhs-dark) 100%);
    background-attachment:fixed;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:24px;
  }
  .login-box{
    background:#fff;border-radius:18px;
    box-shadow:0 14px 40px rgba(0,48,135,0.30);
    padding:48px 44px;max-width:440px;width:100%;
  }
  .amber-rule{width:72px;height:4px;background:var(--amber);border-radius:2px;margin-bottom:24px;}
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:2.2px;color:var(--text-sec);text-transform:uppercase;margin-bottom:14px;}
  h1{font-size:32px;font-weight:900;color:var(--nhs-dark);letter-spacing:-0.8px;margin-bottom:14px;line-height:1.1;}
  p{font-size:14px;color:var(--text-sec);line-height:1.6;margin-bottom:24px;}
  label{display:block;font-size:12px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
  input[type=password]{
    width:100%;padding:14px 16px;font-size:16px;
    border:1.5px solid #d9dee3;border-radius:8px;
    font-family:inherit;color:var(--text);
    outline:none;transition:border-color 0.15s;
  }
  input[type=password]:focus{border-color:var(--nhs-blue);}
  button{
    width:100%;margin-top:18px;padding:14px;font-size:14px;font-weight:700;
    background:var(--nhs-blue);color:#fff;border:none;border-radius:8px;
    cursor:pointer;letter-spacing:0.4px;transition:background 0.15s;
    font-family:inherit;
  }
  button:hover{background:var(--nhs-dark);}
  .err{margin-top:14px;color:#B5121B;font-size:13px;font-weight:600;min-height:18px;}
  .foot{margin-top:32px;padding-top:20px;border-top:1px solid #ebeef1;font-size:11.5px;color:#7E8B97;line-height:1.5;}
</style>
</head>
<body>
  <div class="login-box">
    <div class="amber-rule"></div>
    <div class="eyebrow">Restricted access</div>
    <h1>HomeTest Operating Model</h1>
    <p>This site is private. Please enter the access password to continue.</p>
    <form id="lf" autocomplete="off">
      <label for="pw">Password</label>
      <input type="password" id="pw" autofocus required>
      <button type="submit">Enter</button>
      <div class="err" id="err"></div>
    </form>
    <div class="foot">If you don't have the password, contact the person who shared this link.</div>
  </div>
<script>
const H = "aff9e5c92aa9478e54cc10839fe9cf36615bbe4ae2ad7e6dd6e2c0c14f0b540e";
async function sha256(s){
  const buf = new TextEncoder().encode(s);
  const h = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
if (sessionStorage.getItem('ht_auth') === '1') {
  const dest = sessionStorage.getItem('ht_dest');
  if (dest && dest !== '/' && !dest.endsWith('index.html')) {
    sessionStorage.removeItem('ht_dest');
    window.location.replace(dest);
  } else {
    window.location.replace('home.html');
  }
}
document.getElementById('lf').addEventListener('submit', async (e) => {
  e.preventDefault();
  const v = document.getElementById('pw').value;
  const h = await sha256(v);
  const err = document.getElementById('err');
  if (h === H) {
    sessionStorage.setItem('ht_auth', '1');
    const dest = sessionStorage.getItem('ht_dest');
    if (dest && dest !== '/' && !dest.endsWith('index.html')) {
      sessionStorage.removeItem('ht_dest');
      window.location.href = dest;
    } else {
      window.location.href = 'home.html';
    }
  } else {
    err.textContent = 'Incorrect password.';
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
});
</script>
</body>
</html>
